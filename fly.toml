app            = "noteshare"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_APP_URL = "https://noteshare.fly.dev"

[env]
  PORT          = "3000"
  NODE_ENV      = "production"
  DATABASE_PATH = "/data/app.db"

[[mounts]]
  source      = "noteshare_data"
  destination = "/data"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
